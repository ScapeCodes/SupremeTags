site_name: SupremeTags Documentation
site_description: Official documentation for the SupremeTags Minecraft plugin.
site_author: Scape
repo_name: SupremeTags2
repo_url: https://github.com/Scape-Development/SupremeTags2
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quick-start.md
  - Reference:
      - Commands: commands.md
      - Permissions: permissions.md
      - Placeholders: placeholders.md
  - Configuration:
      - Configuration Overview: configuration.md
      - Tags: tags.md
      - Categories: categories.md
      - Rarities: rarities.md
      - GUIs: guis.md
  - Advanced:
      - Importing: importing.md
      - Developer API: api.md
      - FAQ: faq.md

